services:
  eta-flow-space:
    image: nodered/node-red:4.1.3
    container_name: eta-flow-space
    ports:
      - "1895:1880"
    env_file:
      - ./flow-space/.env-flows
    volumes:
      - ./flow-space:/data
    restart: unless-stopped
    environment:
      - TZ=Russia/Moscow
      - NODE_RED_ENABLE_PROJECTS=false
    entrypoint: >
      sh -c "
        cd /data && npm install
        exec node-red --userDir /data
      "
    networks:
      - eta-flow-space-network

  eta-flow-space-database:
    image: postgres:17
    container_name: eta-flow-space-database
    ports:
      - "35432:5432"
    environment:
      - POSTGRES_DB=eta_flow_space_database
    env_file:
      - ./.env-database
    volumes:
      - ./flow-space-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - eta-flow-space-network

  flow-space-store:
    image: redis:7-alpine
    container_name: flow-space-store
    ports:
      - "6379:6379"
    volumes:
      - ./flow-space-store:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - eta-flow-space-network

  eta-flow-space-database-backup:
    build:
      dockerfile: ./Dockerfile.backup
    container_name: eta-flow-space-database-backup
    privileged: true
    volumes:
      - ./flow-space-backups:/backups
    restart: unless-stopped
    networks:
      - eta-flow-space-network

  eta-flow-space-ui:
    build:
      context: ./flow-space-ui/
      dockerfile: Dockerfile.ui
    container_name: eta-flow-space-ui
    restart: unless-stopped
    networks:
      - eta-flow-space-network

  eta-flow-space-reporting:
    build:
      context: ./flow-space-reporting/
      dockerfile: Dockerfile
    container_name: eta-flow-space-reporting
    restart: unless-stopped
    env_file:
    - ./flow-space-reporting/.env-reporting
    depends_on:
      - eta-flow-space-database
    networks:
      - eta-flow-space-network

  eta-flow-space-gateway:
    image: nginx:alpine
    container_name: eta-flow-space-gateway
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - eta-flow-space
      - eta-flow-space-ui
      - eta-flow-space-reporting
    restart: unless-stopped
    networks:
      - eta-flow-space-network

networks:
  eta-flow-space-network:
