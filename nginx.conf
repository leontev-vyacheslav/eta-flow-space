events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # UI — served at root
        location / {
            proxy_pass http://eta-flow-space-ui:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Node-RED sign-in (no /api prefix)
        location /sign-in {
            proxy_pass http://eta-flow-space:1880/sign-in;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Node-RED health-check (no /api prefix)
        location /health-check {
            proxy_pass http://eta-flow-space:1880/health-check;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Node-RED /static/flows/ (no /api prefix)
        location /static/flows/ {
            proxy_pass http://eta-flow-space:1880/static/flows/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Node-RED API (with /api prefix)
        location /api/ {
            proxy_pass http://eta-flow-space:1880/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Reporting API
        location /api/reporting {
            proxy_pass http://eta-flow-space-reporting:8000/api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }


        ### migrations to the NestJS app web API
        # /api/device-states/, /api/device-states/, /api/device-states/:deviceId/dates
        location /api/device-states/ {
            proxy_pass http://eta-flow-space-web-api:3002/api/device-states/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # /api/flows
        location = /api/flows {
            proxy_pass http://eta-flow-space-web-api:3002/api/flows;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # /api/devices, /api/devices/:deviceId
        location ~ ^/api/devices(/[^/]+)?$ {
            proxy_pass http://eta-flow-space-web-api:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /health-check {
            proxy_pass http://eta-flow-space-web-api:3002/health-check;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /sign-in {
            proxy_pass http://eta-flow-space-web-api:3002/sign-in;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}