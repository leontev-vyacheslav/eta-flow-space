<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Ведомость учета газа</title>

    <style>
        @page {
            margin-top: 10mm;
            margin-bottom: 10mm;
            margin-left: 10mm;
            margin-right: 10mm;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            border-bottom: 1px solid black;
            margin: 0;
            padding: 0;
            padding-bottom: 5px;
            font-size: 16px;
            text-align: center;
        }

        h2 {
            margin-top: 10px;
            padding: 10px;
            border-left: 4px solid #c0c0c0;
            background-color: #f5f5f5;

            font-size: 12px;
            font-weight: bold;
        }

        h3 {
            padding: 6px 10px;
            padding-bottom: 0;
            font-size: 11px;
            font-weight: normal;
        }

        table {
            width: 100%;
            font-size: 10px;
            line-height: initial;
            border-collapse: collapse !important;
            empty-cells: show;
            border-spacing: 0;
            border: 0.5px Solid gray;
            margin: 10px 0 10px 0;
            font-family: 'Times New Roman', Times, serif;
        }

        tbody td {
            border: 0.5px solid gray;
            padding: 5px 5px;
            text-align: left;
            font-size: 10px;
        }

        thead th {
            font-weight: bold;
            border: 0.5px Solid gray;
            padding: 3px 6px 4px;
            background-color: #f0f0f0;
            height: 25px;
        }

        .section {
            margin-bottom: 25px;
        }
    </style>
</head>

<body>
    <h1 style="display: flex; align-items: center; justify-content: center;">
        <style>
            .header-logo path,
            .header-logo rect,
            .header-logo circle,
            .header-logo polygon {
                fill: #000000 !important;
            }
        </style>
        <img class="header-logo" src="{{ templates_dir.parent.parent.as_uri() }}/common/header-logo-grayscale.svg"
            alt="Report Icon" style=" height: 50px; vertical-align: middle; margin-right: 8px;">
        <div style="display: flex; flex-direction: column; flex: 1;">
            <div style="flex: 1;">Ведомость учета параметров ГАЗ</div>
            <div>статистические данные</div>
        </div>
        <div style="width: 55px;"></div>
    </h1>
    <div style="display: flex;">
        <div style="display: flex; gap: 10px; flex-direction: column; margin-top: 5px;">
            <div style="font-size: 10px;">Устройство: {{ device_name }}</div>
            <div style="font-size: 10px;">Тип группировки: {{ period_type | period_type_title_format }}</div>
        </div>
    </div>
</body>

</html>
